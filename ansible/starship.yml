- name: Starship prompt setup for WSL2
  hosts: localhost
  connection: local
  vars_files:
    - defaults.yml
    - vars.yml
  tasks:
    - name: Skip if not in playbooks_in_main_playbook
      meta: end_play
      when: playbooks_in_main_playbook is defined and 'starship' not in playbooks_in_main_playbook

    - import_tasks: tasks/starship.yml

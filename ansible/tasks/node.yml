---
- name: Install fnm
  shell: curl -fsSL https://fnm.vercel.app/install | bash
  args:
    creates: "{{ ansible_env.HOME }}/.local/share/fnm"

- name: Check if Node LTS is installed via fnm
  shell: "{{ ansible_env.HOME }}/.local/share/fnm/fnm list | grep -q lts"
  register: fnm_node_check
  failed_when: false
  changed_when: false
  environment:
    PATH: "{{ ansible_env.HOME }}/.local/share/fnm:{{ ansible_env.PATH }}"

- name: Install Node LTS
  shell: "{{ ansible_env.HOME }}/.local/share/fnm/fnm install --lts"
  when: fnm_node_check.rc != 0
  environment:
    PATH: "{{ ansible_env.HOME }}/.local/share/fnm:{{ ansible_env.PATH }}"

# Packages are defined in vars.yml under emacs_npm_packages.
# npm list -g returns rc != 0 if any package is missing, triggering a full install.
- name: Check if Emacs LSP npm packages are installed
  shell: "{{ ansible_env.HOME }}/.local/share/fnm/fnm exec --using=lts-latest -- npm list -g {{ emacs_npm_packages | join(' ') }}"
  register: emacs_npm_check
  failed_when: false
  changed_when: false

- name: Install Emacs LSP npm packages
  shell: "{{ ansible_env.HOME }}/.local/share/fnm/fnm exec --using=lts-latest -- npm install -g {{ emacs_npm_packages | join(' ') }}"
  when: emacs_npm_check.rc != 0

- name: Check if Gemini CLI is installed
  shell: "{{ ansible_env.HOME }}/.local/share/fnm/fnm exec --using=lts-latest -- npm list -g @google/gemini-cli"
  register: gemini_check
  failed_when: false
  changed_when: false

- name: Install Gemini CLI
  shell: "{{ ansible_env.HOME }}/.local/share/fnm/fnm exec --using=lts-latest -- npm install -g @google/gemini-cli"
  when: gemini_check.rc != 0

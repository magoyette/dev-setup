---
- name: Enable deb-src repositories for Emacs dependencies
  become: true
  ansible.builtin.replace:
    path: /etc/apt/sources.list.d/ubuntu.sources
    regexp: "^Types: deb$"
    replace: "Types: deb deb-src"
  register: deb_src_enabled

- name: Update apt cache after enabling deb-src
  become: true
  ansible.builtin.apt:
    update_cache: true
  when: deb_src_enabled.changed

- name: Install Emacs build dependencies
  become: true
  ansible.builtin.apt:
    name: emacs
    state: build-dep

- name: Install libmagick development packages
  become: true
  ansible.builtin.apt:
    name:
      - libmagickwand-dev
      - libmagickcore-dev
    state: present

- name: Install tree-sitter library
  become: true
  ansible.builtin.apt:
    name: libtree-sitter0
    state: present

- name: Check installed Emacs version
  ansible.builtin.command: emacs --version
  register: emacs_version_output
  failed_when: false
  changed_when: false

- name: Install Emacs {{ emacs_version }} from source
  ansible.builtin.command: "{{ playbook_dir }}/../scripts/install-emacs-in-ubuntu.sh {{ emacs_version }}"
  when: emacs_version_output.rc != 0 or emacs_version not in emacs_version_output.stdout

- ansible.builtin.import_tasks: emacs-lsp-booster.yml
- name: Add emacs terminal alias
  ansible.builtin.lineinfile:
    path: "{{ ansible_env.HOME }}/.bashrc"
    regexp: "^alias emacs="
    line: 'alias emacs="emacs -nw"'
    state: present

- name: Add emacsclient scratch buffer alias
  ansible.builtin.lineinfile:
    path: "{{ ansible_env.HOME }}/.bashrc"
    regexp: "^alias e="
    line: "alias e='emacsclient -t -a \"\" --eval \"(progn (switch-to-buffer \\\"*scratch*\\\") nil)\"'"
    state: present

- name: Add emacsclient Magit status alias
  ansible.builtin.lineinfile:
    path: "{{ ansible_env.HOME }}/.bashrc"
    regexp: "^alias eg="
    line: "alias eg='emacsclient -t -a \"\" --eval \"(progn (magit-status) nil)\"'"
    state: present

- ansible.builtin.import_tasks: emacs-node.yml

---
- name: Ensure ~/.local/bin directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.local/bin"
    state: directory
    mode: "0755"

- name: Check installed Starship version
  ansible.builtin.command: "{{ ansible_env.HOME }}/.local/bin/starship --version"
  register: starship_version_output
  failed_when: false
  changed_when: false

- name: Download and install Starship {{ starship_version }}
  ansible.builtin.shell: |
    set -euo pipefail

    tmp_dir="$(mktemp -d)"
    trap 'rm -rf "${tmp_dir}"' EXIT

    curl -sSfL "https://github.com/starship/starship/releases/download/{{ starship_version }}/starship-x86_64-unknown-linux-musl.tar.gz" \
      -o "${tmp_dir}/starship.tar.gz"

    tar -xzf "${tmp_dir}/starship.tar.gz" -C "${tmp_dir}"
    install -m 0755 "${tmp_dir}/starship" "{{ ansible_env.HOME }}/.local/bin/starship"
  args:
    executable: /bin/bash
  when: starship_version_output.rc != 0 or ("starship " ~ (starship_version | regex_replace('^v', ''))) not in starship_version_output.stdout

- name: Add Starship init to bashrc before zoxide
  ansible.builtin.lineinfile:
    path: "{{ ansible_env.HOME }}/.bashrc"
    regexp: '^eval "\$\(starship init bash\)"$'
    line: 'eval "$(starship init bash)"'
    insertbefore: '^eval "\$\(zoxide init bash\)"$'
    state: present

- name: Deploy Starship dotfiles with stow
  ansible.builtin.command: >
    stow
    --dir="{{ playbook_dir }}/.."
    --target="{{ ansible_env.HOME }}"
    starship
  changed_when: false

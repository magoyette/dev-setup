---
- name: Check installed ccusage version
  ansible.builtin.command: "{{ ansible_env.HOME }}/.bun/bin/ccusage --version"
  register: ccusage_version_output
  failed_when: false
  changed_when: false

- name: Check latest ccusage version
  ansible.builtin.command: "{{ ansible_env.HOME }}/.local/share/fnm/fnm exec --using={{ fnm_node_version }} -- npm view ccusage version"
  register: ccusage_latest_version_output
  failed_when: false
  changed_when: false

- name: Install or upgrade ccusage globally with Bun
  ansible.builtin.command: "{{ ansible_env.HOME }}/.bun/bin/bun install -g ccusage@latest"
  when: >-
    ccusage_version_output.rc != 0 or
    (ccusage_latest_version_output.rc == 0 and
    ccusage_version_output.stdout | trim != ccusage_latest_version_output.stdout | trim)
  changed_when: true

- name: Ensure ~/.local/bin exists for ccusage symlink
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.local/bin"
    state: directory
    mode: "0755"

- name: Link ccusage into ~/.local/bin
  ansible.builtin.file:
    src: "{{ ansible_env.HOME }}/.bun/bin/ccusage"
    dest: "{{ ansible_env.HOME }}/.local/bin/ccusage"
    state: link
    force: true

---
- name: Check if OpenCode is installed
  ansible.builtin.command: which opencode
  register: opencode_check
  failed_when: false
  changed_when: false

- name: Install OpenCode
  ansible.builtin.shell: curl -fsSL https://opencode.ai/install | bash
  when: opencode_check.rc != 0

- name: Ensure ~/.config/opencode directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config/opencode"
    state: directory
    mode: "0755"

- name: Merge OpenCode global config
  ansible.builtin.command: "{{ playbook_dir }}/../scripts/merge-opencode-config.sh {{ ansible_env.HOME }}/.config/opencode/opencode.json"
  environment:
    AI_ASSISTANTS_MCP_CATALOG: "{{ ai_assistants_mcp_catalog | to_json }}"
    AI_ASSISTANTS_MCPS: "{{ ai_assistants_mcps | to_json }}"
  register: opencode_config_merge
  changed_when: opencode_config_merge.rc == 2
  failed_when: opencode_config_merge.rc not in [0, 2]

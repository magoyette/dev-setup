---
- name: Update apt cache
  become: true
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Upgrade apt packages
  become: true
  apt:
    upgrade: safe

- name: Install apt packages
  become: true
  apt:
    name:
      - bat
      - build-essential
      - git-delta
      - jq
      - pandoc
      - ripgrep
      - shellcheck
      - stow
      - unzip
    state: present

---
# Packages are defined in defaults.yml under emacs_npm_packages.
# npm list -g returns rc != 0 if any package is missing, triggering a full install.
- name: Check if Emacs LSP npm packages are installed
  ansible.builtin.command: "{{ ansible_env.HOME }}/.local/share/fnm/fnm exec --using={{ fnm_node_version }} -- npm list -g {{ emacs_npm_packages | join(' ') }}"
  register: emacs_npm_check
  failed_when: false
  changed_when: false

- name: Install Emacs LSP npm packages
  ansible.builtin.command: "{{ ansible_env.HOME }}/.local/share/fnm/fnm exec --using={{ fnm_node_version }} -- npm install -g {{ emacs_npm_packages | join(' ') }}"
  when: emacs_npm_check.rc != 0

---
- name: Check if Codex CLI is installed
  shell: "{{ ansible_env.HOME }}/.local/share/fnm/fnm exec --using={{ fnm_node_version }} -- npm list -g @openai/codex"
  register: codex_check
  failed_when: false
  changed_when: false

- name: Install Codex CLI
  shell: "{{ ansible_env.HOME }}/.local/share/fnm/fnm exec --using={{ fnm_node_version }} -- npm install -g @openai/codex"
  when: codex_check.rc != 0

- name: Ensure Codex config directory exists
  file:
    path: "{{ ansible_env.HOME }}/.codex"
    state: directory
    mode: "0755"

- name: Ensure Codex config file exists
  copy:
    content: ""
    dest: "{{ ansible_env.HOME }}/.codex/config.toml"
    force: false
    mode: "0644"

- name: Configure Codex project doc fallback filenames at TOML root
  lineinfile:
    path: "{{ ansible_env.HOME }}/.codex/config.toml"
    regexp: "^project_doc_fallback_filenames\\s*="
    insertbefore: BOF
    line: 'project_doc_fallback_filenames = ["CLAUDE.md"]'

- name: Configure Codex project doc max bytes at TOML root
  lineinfile:
    path: "{{ ansible_env.HOME }}/.codex/config.toml"
    regexp: "^project_doc_max_bytes\\s*="
    insertbefore: BOF
    line: "project_doc_max_bytes = {{ codex_project_doc_max_bytes }}"

- name: Ensure Codex TUI section exists in config
  lineinfile:
    path: "{{ ansible_env.HOME }}/.codex/config.toml"
    regexp: "^\\[tui\\]\\s*$"
    line: "[tui]"

- name: Configure Codex status line in config
  lineinfile:
    path: "{{ ansible_env.HOME }}/.codex/config.toml"
    regexp: "^\\s*status_line\\s*="
    insertafter: "^\\[tui\\]\\s*$"
    line: "status_line = {{ codex_status_line | to_json }}"

- name: Ensure Codex sandbox workspace-write section exists in config
  lineinfile:
    path: "{{ ansible_env.HOME }}/.codex/config.toml"
    regexp: "^\\[sandbox_workspace_write\\]\\s*$"
    line: "[sandbox_workspace_write]"

- name: Configure Codex sandbox writable roots in config
  lineinfile:
    path: "{{ ansible_env.HOME }}/.codex/config.toml"
    regexp: "^\\s*writable_roots\\s*="
    insertafter: "^\\[sandbox_workspace_write\\]\\s*$"
    line: "writable_roots = {{ ai_assistants_sandbox_writable_roots | to_json }}"

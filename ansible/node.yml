---
- name: Node setup for WSL2
  hosts: localhost
  connection: local
  vars_files:
    - defaults.yml
    - vars.yml
  tasks:
    - name: Skip if not in playbooks_in_main_playbook
      ansible.builtin.meta: end_play
      when: playbooks_in_main_playbook is defined and 'node' not in playbooks_in_main_playbook

    - ansible.builtin.import_tasks: tasks/node.yml
    - ansible.builtin.import_tasks: tasks/bun.yml
    - ansible.builtin.import_tasks: tasks/playwright.yml

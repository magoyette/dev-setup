---
- name: AI assistants setup for WSL2
  hosts: localhost
  connection: local
  vars_files:
    - defaults.yml
    - vars.yml
  tasks:
    - name: Skip if not in playbooks_in_main_playbook
      ansible.builtin.meta: end_play
      when: playbooks_in_main_playbook is defined and 'ai-assistants' not in playbooks_in_main_playbook

    - name: Validate enabled AI assistant MCP servers
      ansible.builtin.assert:
        that:
          - ai_assistants_mcps | type_debug == 'list'
          - ai_assistants_mcps | unique | length == ai_assistants_mcps | length
          - ai_assistants_mcps | difference(ai_assistants_mcp_catalog.keys() | list) | length == 0
        fail_msg: >-
          ai_assistants_mcps must be a list of unique supported names. Unknown names: {{
            ai_assistants_mcps | difference(ai_assistants_mcp_catalog.keys() | list) | join(', ')
          }}. Supported names: {{ ai_assistants_mcp_catalog.keys() | list | join(', ') }}.

    - ansible.builtin.import_tasks: tasks/claude-code.yml
    - ansible.builtin.import_tasks: tasks/codex.yml
    - ansible.builtin.import_tasks: tasks/opencode.yml
    - name: Run Crit tasks
      ansible.builtin.import_tasks: tasks/crit.yml
    - ansible.builtin.import_tasks: tasks/herdr.yml
    - ansible.builtin.import_tasks: tasks/ccusage.yml
    - ansible.builtin.import_tasks: tasks/global-agent-context.yml
    - ansible.builtin.import_tasks: tasks/ast-grep.yml
    - ansible.builtin.import_tasks: tasks/agent-skills.yml

emacs_version: "30.2"
emacs_lsp_booster_version: "v0.2.1"
emacs_lsp_booster_archive_name: "emacs-lsp-booster_v0.2.1_x86_64-unknown-linux-musl.zip"
emacs_lsp_booster_binary_sha256: "30eae1ba447ac5f2a87a45dab02d612b6afac6b6652ade31b736a6984de24cd6"
difftastic_version: "0.67.0"
hadolint_version: "v2.14.0"
tokei_version: "v12.1.2"
starship_version: "v1.24.2"
neovim_version: "v0.11.6"
neovim_archive_name: "nvim-linux-x86_64.tar.gz"
crit_version: "v0.16.1"
crit_linux_amd64_sha256: "ba489abaf89f0402acf5a5ddd12305e43b72f4fef1586e429fb64dad799ef61a"
codex_project_doc_max_bytes: 1073741824
claude_sandbox_enabled: true
ai_assistants_mcp_catalog:
  context7:
    url: https://mcp.context7.com/mcp
  grep:
    url: https://mcp.grep.app
ai_assistants_mcps:
  - context7
  - grep
codex_status_line:
  - model-with-reasoning
  - fast-mode
  - context-used
  - current-dir
  - git-branch
  - five-hour-limit
  - weekly-limit

# Claude Code third-party marketplaces (GitHub repo paths)
claude_code_marketplaces:
  - openai/codex-plugin-cc
  - tomasz-tomczyk/crit

# Claude Code plugins installed from the official marketplace
claude_code_plugins:
  - skill-creator@claude-plugins-official
  - claude-md-management@claude-plugins-official
  - claude-code-setup@claude-plugins-official
  - frontend-design@claude-plugins-official
  - feature-dev@claude-plugins-official
  - codex@openai-codex
  - crit@crit

# npm global packages required by Emacs LSP mode and formatting tools
emacs_npm_packages:
  - "@astrojs/language-server"
  - bash-language-server
  - eslint
  - js-yaml
  - prettier
  - prettier-plugin-astro
  - prettier-plugin-tailwindcss
  - stylelint
  - stylelint-config-standard
  - typescript
  - typescript-language-server
  - vscode-langservers-extracted
  - yaml-language-server

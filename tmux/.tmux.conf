# -- Basic Settings ------------------------------------------
set -g prefix C-b
set -g escape-time 0
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g mouse on
set -g automatic-rename on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"
set -sa terminal-features ",*:RGB"
set -ga update-environment " COLORTERM"
set-environment -g COLORTERM "truecolor"

# -- Status Bar ---------------------------------------------
set -g status-position bottom
set -g status-interval 5
set -g status-left "#{session_name} "
set -g status-left-length 50
set -g status-right "#{host} %Y-%m-%d %H:%M"
set -g status-right-length 50

# -- Keybindings --------------------------------------------
bind-key c new-window -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key H resize-pane -L 5
bind-key J resize-pane -D 5
bind-key K resize-pane -U 5
bind-key L resize-pane -R 5
bind-key r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# -- Plugins -----------------------------------------------
set -g @tmux-which-key-xdg-enable 1
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'odedlaz/tmux-onedark-theme'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'

# -- Initialize TMUX plugin manager -------------------------
run '~/.tmux/plugins/tpm/tpm'

# -- Theme Compatibility Overrides --------------------------
# Keep the tmux theme on tmux UI elements, but let terminal apps render their
# own colors instead of inheriting pane-wide styles from the theme.
set -g window-style "default"
set -g window-active-style "default"
